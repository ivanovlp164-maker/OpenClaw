name: deploy

on:
  push:
    branches: [main]
    paths:
      - "docker-compose.yml"
      - ".env.example"
      - "scripts/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Run remote update
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.VPS_TAILSCALE_HOSTNAME }}
          USER: ${{ secrets.VPS_DEPLOY_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh -i ~/.ssh/deploy -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            "${USER}@${HOST}" \
            'cd /opt/openclaw && ./scripts/update.sh'
