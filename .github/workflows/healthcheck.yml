name: healthcheck

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Probe gateway
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.VPS_TAILSCALE_HOSTNAME }}
          USER: ${{ secrets.VPS_DEPLOY_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh -i ~/.ssh/deploy -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            "${USER}@${HOST}" \
            'curl -fsS http://127.0.0.1:18789/healthz'

      - name: Notify Telegram on failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -fsS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=[OpenClaw] healthcheck FAILED on $(date -u +%FT%TZ). Run /opt/openclaw/scripts/logs.sh on the VPS."
